<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Skallstuggu</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
    }

    @media (min-width: 900px) {
      .admin-layout {
        grid-template-columns: 1fr 1fr;
      }
    }

    .menu {
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 14px;
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .foresporsel { background: #fff3cd; }
    .godkjent { background: #d4edda; }
    .avslatt { background: #f8d7da; }

    .customer-message {
      background: #e3f2fd;
      padding: 12px;
      border-left: 5px solid #2196F3;
      margin: 12px 0;
      border-radius: 4px;
      font-size: 0.95em;
    }

    .contact-link {
      color: #1976d2;
      text-decoration: underline;
      cursor: pointer;
    }
    .contact-link:hover { 
      color: #1565c0; 
    }

    .warning { color: #d32f2f; font-weight: bold; }
    .section-header {
      cursor: pointer;
      margin: 25px 0 12px 0;
      font-size: 1.25em;
    }
    .hidden { display: none; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-top: 15px;
    }

    .day {
      padding: 10px 4px;
      text-align: center;
      border-radius: 8px;
      background: #e8f5e9;
      border: 1px solid #ddd;
      font-size: 0.9em;
      min-height: 52px;
    }

    .booked { background: #ffcdd2; }
    .half-start { background: linear-gradient(to right, #e8f5e9 50%, #ffcdd2 50%); }
    .half-end { background: linear-gradient(to right, #ffcdd2 50%, #e8f5e9 50%); }
    .highlight { border: 3px solid #1976d2; }

    #search {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1em;
    }

    .calendar-nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="../images/Logo.png" alt="Skallstuggu" style="height: 65px; width: auto;">
  </div>
</header>

<section class="page">
  <h1>Booking admin</h1>

  <div class="admin-layout">
    <!-- VENSTRE - Forespørsler -->
    <div>
      <input id="search" placeholder="Søk navn eller e-post...">

      <h3 class="section-header" onclick="toggle('foresporsler')">📩 Forespørsler</h3>
      <div id="foresporsler"></div>

      <h3 class="section-header" onclick="toggle('godkjente')">✅ Godkjente</h3>
      <div id="godkjente" class="hidden"></div>

      <h3 class="section-header" onclick="toggle('avslatte')">❌ Avslåtte</h3>
      <div id="avslatte" class="hidden"></div>
    </div>

    <!-- HØYRE - Kalender -->
    <div>
      <h2>Kalender</h2>
      <div class="calendar-nav">
        <button onclick="changeMonth(-1)">← Forrige måned</button>
        <h3 id="monthTitle"></h3>
        <button onclick="changeMonth(1)">Neste måned →</button>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>

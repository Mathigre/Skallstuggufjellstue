<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Skallstuggu</title>
  <link rel="stylesheet" href="../style.css">

  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .menu {
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 16px;
      background: #f8f9fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .foresporsel { background: #fff3cd; }
    .godkjent { background: #d4edda; }
    .avslatt { background: #f8d7da; }

    .customer-message {
      background: #e3f2fd;
      padding: 12px;
      border-left: 5px solid #2196F3;
      margin: 12px 0;
      border-radius: 4px;
    }

    .contact-link {
      color: #1976d2;
      text-decoration: underline;
      cursor: pointer;
    }
    .contact-link:hover {
      color: #1565c0;
    }

    .warning { color: red; font-weight: bold; }
    .section-header { cursor: pointer; margin: 25px 0 10px 0; }
    .hidden { display: none; }
  </style>
</head>
<body>

<header class="navbar">
  <div class="logo">
    <img src="../images/Logo.png" alt="Skallstuggu">
  </div>
</header>

<section class="page">
  <h1>Booking admin</h1>

  <div class="admin-layout">
    <!-- VENSTRE -->
    <div>
      <input id="search" placeholder="Søk navn eller e-post..." style="width:100%; padding:12px; margin-bottom:20px;">

      <h3 class="section-header" onclick="toggle('foresporsler')">📩 Forespørsler</h3>
      <div id="foresporsler"></div>

      <h3 class="section-header" onclick="toggle('godkjente')">✅ Godkjente</h3>
      <div id="godkjente" class="hidden"></div>

      <h3 class="section-header" onclick="toggle('avslatte')">❌ Avslåtte</h3>
      <div id="avslatte" class="hidden"></div>
    </div>

    <!-- HØYRE -->
    <div>
      <h2>Kalender</h2>
      <div style="display:flex; justify-content:center; gap:20px; margin-bottom:15px;">
        <button onclick="changeMonth(-1)">←</button>
        <h3 id="monthTitle"></h3>
        <button onclick="changeMonth(1)">→</button>
      </div>
      <div class="calendar-grid" id="calendar"></div>
    </div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - Skallstuggu</title>
  <link rel="stylesheet" href="style.css">
  
  <style>
    #messageBox {
      margin: 20px 0;
      padding: 15px 20px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.5;
      display: none;
    }
    .message-success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message-error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    #customerMessage {
      width: 100%;
      height: 100px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: inherit;
      resize: vertical;
      margin-top: 5px;
    }

    label {
      display: block;
      margin: 18px 0 6px;
      font-weight: 500;
    }

    .check-bookings {
      background: #f9f5eb;
      border: 2px solid #8B4A2B;
      border-radius: 12px;
      padding: 25px;
      margin-bottom: 40px;
    }

    .info-box {
      background-color: #f9f5eb;
      border-left: 5px solid #8B4A2B;
      padding: 16px 20px;
      margin: 25px 0 30px 0;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.55;
      color: #3c2f2f;
    }

    /* ========================
       HAMBURGER MENU
       ======================== */
    .hamburger {
      display: none;
      font-size: 1.9rem;
      cursor: pointer;
      color: #333;
      padding: 5px 10px;
    }

    @media (max-width: 900px) {
      .nav-links {
        display: none;
        flex-direction: column;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: white;
        padding: 20px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        gap: 15px;
      }
      
      .nav-links.active {
        display: flex;
      }

      .hamburger {
        display: block;
      }
    }

    /* ========================
       MOBIL TILPASNING
       ======================== */
    @media (max-width: 768px) {
      .page {
        padding: 30px 15px;
      }
      
      h1, h2 {
        text-align: center;
      }
      
      .check-bookings div[style*="flex"] {
        flex-direction: column !important;
        gap: 12px;
      }
      
      .check-bookings input,
      .check-bookings button {
        width: 100%;
        padding: 14px;
      }

      .calendar-header {
        flex-direction: column !important;
        align-items: center;
        gap: 12px !important;
      }

      form input[type="text"],
      form input[type="email"],
      form input[type="tel"],
      form input[type="date"],
      form textarea {
        width: 100%;
        font-size: 16px;   /* Hindrer zoom på iOS */
        padding: 12px;
      }

      form button {
        width: 100%;
        padding: 16px;
        font-size: 1.1em;
      }
    }
  </style>
</head>
<body>

<!-- NAVBAR med Hamburger -->
<header class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/Logo.png" alt="Skallstuggu">
    </a>
    
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Hjem</a>
      <a href="lokaler.html">Lokaler og Priser</a>
      <a href="booking.html">Booking</a>
      <a href="servering.html">Servering</a>
      <a href="firmasamlinger.html">Firma</a>
      <a href="turopplevelser.html">Opplevelser</a>
      <a href="kontakt.html">Kontakt</a>
    </nav>

    <div class="hamburger" id="hamburger">☰</div>
  </div>
</header>

<section class="page">
  <h1>Send bookingforespørsel</h1>

  <!-- Sjekk mine bookinger -->
  <div class="check-bookings">
    <h3 style="margin-top: 0; color: #8B4A2B;">Sjekk mine bookinger</h3>
    <p style="margin-bottom: 12px;">Skriv inn e-postadressen din for å se dine forespørsler:</p>
   
    <div style="display: flex; gap: 12px;">
      <input type="email" id="checkEmail" placeholder="din@email.com"
             style="flex: 1; padding: 14px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em;">
      <button onclick="checkMyBookings()"
              style="padding: 14px 28px; background: #8B4A2B; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap;">
        Sjekk
      </button>
    </div>
    <div id="myBookingsResult" style="margin-top: 20px; line-height: 1.6;"></div>
  </div>

  <!-- KALENDER -->
  <h2>Velg dato</h2>
  <div class="calendar-header" style="display:flex; justify-content:center; gap:20px; margin-bottom:15px; flex-wrap: wrap;">
    <button onclick="changeMonth(-1)">← Forrige måned</button>
    <h3 id="monthTitle"></h3>
    <button onclick="changeMonth(1)">Neste måned →</button>
  </div>
  
  <div class="calendar-grid" id="calendar"></div>

  <div class="info-box">
    <strong>Husk å sjekke i kalenderen om datoene du ønsker er ledige</strong><br>
    <small style="color:#555;">Kun godkjente bookinger vises i kalenderen.</small>
  </div>

  <div id="messageBox"></div>

  <!-- SKJEMA -->
  <form id="bookingForm">
    <input type="text" id="name" placeholder="Navn" required><br><br>
    <input type="email" id="email" placeholder="E-post" required><br><br>
    <input type="tel" id="phone" placeholder="Telefonnummer" required><br><br>
    
    <label>Fra dato:</label>
    <input type="date" id="start" required><br><br>
    
    <label>Til dato:</label>
    <input type="date" id="end" required><br><br>
    
    <label>Eventuell melding eller kommentar til oss (valgfritt):</label>
    <textarea id="customerMessage" rows="4" maxlength="300"
      placeholder="Skriv her hvis du har spesielle ønsker, allergier, tidspunkt du foretrekker, eller andre kommentarer..."></textarea><br><br>
    
    <button type="submit" class="btn">Send forespørsel</button>
  </form>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js"></script>

<script>
// Hamburger meny
const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');

hamburger.addEventListener('click', () => {
  navLinks.classList.toggle('active');
});
</script>

</body>
</html>
